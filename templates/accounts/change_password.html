{% extends 'base/base.html' %}
{% load bootstrap5 %}
{% block title %}
    Change Password
{% endblock %}
{% block content %}
	<form method="post" action="{% url 'change_password' %}" novalidate class="register_form shadow-sm">
        <h1 class="text-center">Change Password</h1>
        <br>
        {% csrf_token %}
        {% bootstrap_form form %}
        <button type="submit" name="btn" value="submit" class="btn btn-primary w-100">Submit</button>
    </form>
{% endblock %}
